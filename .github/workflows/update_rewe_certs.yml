name: Update REWE Certificates

on:
  schedule:
    - cron: '0 6 1 * *' # On the 1st of every month at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  update-certs:
    name: Check and Update Certs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install curl_cffi cryptography

      - name: Download latest APK
        run: |
          python .github/scripts/fetch_rewe_apk.py rewe.apk

      - name: Extract and Compare Certificates
        id: cert_check
        run: |
          mkdir -p temp_certs
          if python .github/scripts/extract_rewe_certs.py rewe.apk temp_certs; then
            echo "Certs extracted successfully."
            
            # Calculate SHA256 of the new pem certificate
            NEW_HASH=$(sha256sum temp_certs/client.pem | cut -d' ' -f1)
            echo "New cert hash: $NEW_HASH"
            
            # Read old hash
            OLD_HASH=""
            if [ -f custom_components/rewe/certs/certs.sha256 ]; then
              OLD_HASH=$(cat custom_components/rewe/certs/certs.sha256 | tr -d '[:space:]')
            fi
            echo "Old cert hash: $OLD_HASH"
            
            if [ "$NEW_HASH" != "$OLD_HASH" ]; then
              echo "Hash changed! Updating certs.sha256"
              mkdir -p custom_components/rewe/certs
              echo "$NEW_HASH" > custom_components/rewe/certs/certs.sha256
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "No hash changes."
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Certs extraction failed!"
            exit 1
          fi

      - name: Commit and Push cert hash change
        if: steps.cert_check.outputs.changed == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/rewe/certs/certs.sha256
          git commit -m "chore(certs): update REWE client certificate hash"
          git push origin HEAD:main

      - name: Trigger Release Workflow
        if: steps.cert_check.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run release.yml --ref main -f release_type=stable -f bump_level=patch
