name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Type of release (stable, beta, nightly)"
        required: true
        default: "beta"
        type: choice
        options:
          - stable
          - beta
          - nightly

      bump_level:
        description: "Bump Level (SemVer only: major, minor, patch)"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

      version_override:
        description: "Manually override new version (e.g. 1.2.3 or 2026.6.2b1). Leave empty to use automatic calculation."
        required: false
        type: string
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**/manifest.json'
      - '**/translations/**'
      - 'CHANGELOG.md'
      - '.github/workflows/issue-orchestrator.yml'
      - '.github/ISSUE_TEMPLATE/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-release
  cancel-in-progress: true

jobs:
  versioning:
    name: Determine Version
    if: github.event_name == 'workflow_dispatch' || (github.event.head_commit != null && contains(github.event.head_commit.message, '[bump-version]'))
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      tag: ${{ steps.get_version.outputs.tag }}
      is_prerelease: ${{ steps.get_version.outputs.is_prerelease }}
      release_body: ${{ steps.get_version.outputs.release_body }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Calculate Version and Release Details
        id: get_version
        shell: bash
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type || (contains(github.event.head_commit.message, '[bump-version]') && 'stable' || 'beta') }}
          BUMP_LEVEL: ${{ github.event.inputs.bump_level || 'patch' }}
          VERSION_OVERRIDE: ${{ inputs.version_override }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          python .github/scripts/calculate_release_details.py

      - name: Upload Release Body
        uses: actions/upload-artifact@v4
        with:
          name: release-body
          path: release_body.md

  sync-version:
    name: Sync Repository Version
    needs: versioning
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Configure Git and pull latest
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git pull --rebase origin ${{ github.ref_name }}

      - name: Update Files
        shell: bash
        run: |
          python .github/scripts/version_manager.py bump --type ${{ github.event.inputs.release_type || (contains(github.event.head_commit.message, '[bump-version]') && 'stable' || 'beta') }} --level ${{ github.event.inputs.bump_level || 'patch' }} --override "${{ github.event.inputs.version_override || '' }}"

          if [ -f .github/scripts/update_templates.py ]; then
            python .github/scripts/update_templates.py "${{ needs.versioning.outputs.version }}"
          fi

      - name: Upload Updated Components


        uses: actions/upload-artifact@v4


        with:


          name: updated-components


          path: custom_components/


          retention-days: 1



      - name: Commit and Push
        run: |
          git add custom_components/*/manifest.json .github/ISSUE_TEMPLATE/*.yml .github/ISSUE_TEMPLATE/*.yaml 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: release version ${{ needs.versioning.outputs.version }} [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || (git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }})
          fi

      - name: Download Release Body
        uses: actions/download-artifact@v4
        with:
          name: release-body

      - name: Update Draft Status
        shell: bash
        run: |
          cp release_body.md updated_draft_body.md

      - name: Create Draft Release on GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.versioning.outputs.tag }}
          VERSION: ${{ needs.versioning.outputs.version }}
          IS_PRERELEASE: ${{ needs.versioning.outputs.is_prerelease }}
        shell: bash
        run: |
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'" or .name=="Release '$VERSION'") | select(.draft==true) | .id')
          if [ -n "$release_id" ]; then
            gh api -X DELETE "repos/$REPO/releases/$release_id"
          fi
          git tag -d "$TAG" 2>/dev/null || true
          git push --delete origin "$TAG" 2>/dev/null || true

          prerelease_arg=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_arg="--prerelease"
          fi
          gh release create "$TAG" \
            --target "${{ github.ref_name }}" \
            --title "Release $VERSION" \
            --notes-file "updated_draft_body.md" \
            --draft \
            $prerelease_arg

  gh-release:
    needs: [versioning, sync-version]
    if: always() && needs.versioning.result == 'success' && needs.sync-version.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Pull latest changes
        run: |
          git pull --rebase origin ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies for certificate extraction
        run: |
          pip install curl_cffi cryptography

      - name: Download REWE APK
        run: |
          python .github/scripts/fetch_rewe_apk.py rewe.apk

      - name: Extract mTLS certificates
        run: |
          python .github/scripts/extract_rewe_certs.py rewe.apk custom_components/rewe/certs

      - name: Download Updated Components


        uses: actions/download-artifact@v4


        with:


          name: updated-components


          path: custom_components/



      - name: 📦 Zip Component
        run: |
          cd custom_components/rewe
          zip -r ../../rewe.zip .

      - name: Download Release Body Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-body

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.versioning.outputs.tag }}
          VERSION: ${{ needs.versioning.outputs.version }}
          IS_PRERELEASE: ${{ needs.versioning.outputs.is_prerelease }}
        shell: bash
        run: |
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'" or .name=="Release '$VERSION'") | select(.draft==true) | .id')
          
          prerelease_arg=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_arg="--prerelease"
          fi
          
          if [ -n "$release_id" ]; then
            gh api -X PATCH "repos/$REPO/releases/$release_id" \
              -f tag_name="$TAG" \
              -f target_commitish="${{ github.ref_name }}" \
              -f name="Release $VERSION" \
              -f body_path="release_body.md" \
              -F draft=false \
              -F prerelease=$( [ "$IS_PRERELEASE" = "true" ] && echo "true" || echo "false" )
              
            gh release upload "$TAG" rewe.zip --clobber
          else
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Release $VERSION" \
              --notes-file "release_body.md" \
              $prerelease_arg \
              rewe.zip
          fi
 
      - name: Post-Release Dev Bump
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git reset --hard HEAD
          git pull --rebase origin ${{ github.ref_name }}
          git fetch --tags
          NEW_DEV=$(python .github/scripts/version_manager.py bump --type dev --level patch)

          if [ -f .github/scripts/update_templates.py ]; then
            python .github/scripts/update_templates.py "${{ needs.versioning.outputs.version }}"
          fi
          if ! git diff --quiet; then
            git commit -am "chore(dev): bump to $NEW_DEV [skip ci]"
            git push origin HEAD:${{ github.ref_name }} || (git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }})
          fi

  cleanup-release:
    needs: [versioning, sync-version, gh-release]
    if: always() && needs.versioning.result == 'success' && (needs.sync-version.result == 'failure' || needs.gh-release.result == 'failure' || cancelled())
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete Draft Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.versioning.outputs.tag }}
        shell: bash
        run: |
          release_id=$(gh api "repos/$REPO/releases" --jq '.[] | select(.tag_name=="'$TAG'") | select(.draft==true) | .id')
          if [ -n "$release_id" ]; then
            gh api -X DELETE "repos/$REPO/releases/$release_id"
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          fi


 
      - name: Delete Component Artifact
  uses: actions/github-script@v7
  with:
    script: |
      const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
        owner: context.repo.owner,
        repo: context.repo.repo,
        run_id: context.runId,
      });
      const target = artifacts.artifacts.find(a => a.name === "updated-components");
      if (target) {
        await github.rest.actions.deleteArtifact({
          owner: context.repo.owner,
          repo: context.repo.repo,
          artifact_id: target.id,
        });
      }
